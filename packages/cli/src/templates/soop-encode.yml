name: Soop Encode

on:
  push:
    branches: [main]
    paths-ignore:
      - .soop/graph.json
      - .soop/embeddings.jsonl

permissions:
  contents: write
  pull-requests: write

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Repo Please
        run: bun install -g @pleaseai/soop

      - name: Encode or evolve RPG
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          # Choose search strategy: hybrid if embedding API available, text-only otherwise
          if [ -n "$VOYAGE_API_KEY" ]; then
            SEARCH_FLAG="-s hybrid --embed-model voyage-ai/voyage-4"
          else
            SEARCH_FLAG="-s hybrid --embed-model transformers/voyageai/voyage-4-nano"
          fi

          if [ ! -f ".soop/graph.json" ]; then
            echo "No existing graph — running full encode"
            mkdir -p .soop
            soop encode . -o .soop/graph.json $SEARCH_FLAG
          else
            LAST_COMMIT=$(soop last-commit .soop/graph.json 2>/dev/null || echo "")
            if [ -z "$LAST_COMMIT" ]; then
              echo "No commit stamp — running full encode"
              soop encode . -o .soop/graph.json $SEARCH_FLAG
            else
              echo "Evolving from $LAST_COMMIT..HEAD"
              soop evolve . -l .soop/graph.json -c "$LAST_COMMIT..HEAD" $SEARCH_FLAG || {
                echo "Evolve failed, falling back to full encode"
                soop encode . -o .soop/graph.json $SEARCH_FLAG
              }
            fi
          fi

      - name: Create PR with updated graph
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(soop): update graph'
          title: 'chore(soop): update graph'
          body: Auto-generated by Repo Encode workflow.
          branch: chore/soop-update-graph
          add-paths: |
            .soop/graph.json
            .soop/embeddings.jsonl
