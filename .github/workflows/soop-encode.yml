name: Soop Encode

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.py'
      - '**/*.rs'
      - '**/*.go'
      - '**/*.java'
      - '!vendor/**'
      - '!**/node_modules/**'
      - '!**/dist/**'
      - '!**/build/**'
      - '!.soop/graph.json'
      - '!.soop/embeddings.json'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  encode:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: Install Repo Please
        run: bun install -g @pleaseai/soop@next

      - name: Restore semantic cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .soop/cache/semantic-cache.db*
          key: semantic-cache-${{ github.sha }}
          restore-keys: semantic-cache-

      - name: Encode or evolve RPG
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          if [ -n "$VOYAGE_API_KEY" ]; then
            EMBED_MODEL="voyage-ai/voyage-4"
          else
            EMBED_MODEL="transformers/voyageai/voyage-4-nano"
          fi
          EMBED_FLAG="--embed --embed-model $EMBED_MODEL"

          if [ ! -f ".soop/graph.json" ]; then
            echo "No existing graph — running full encode"
            mkdir -p .soop
            soop encode . -o .soop/graph.json -m google/gemini-3.1-flash-lite-preview $EMBED_FLAG
          else
            LAST_COMMIT=$(soop last-commit .soop/graph.json 2>/dev/null || echo "")
            if [ -z "$LAST_COMMIT" ]; then
              echo "No commit stamp — running full encode"
              soop encode . -o .soop/graph.json -m google/gemini-3.1-flash-lite-preview $EMBED_FLAG
            else
              echo "Evolving from $LAST_COMMIT..HEAD"
              soop evolve . -l .soop/graph.json -c "$LAST_COMMIT..HEAD" -m google/gemini-3.1-flash-lite-preview || {
                echo "Evolve failed, falling back to full encode"
                soop encode . -o .soop/graph.json -m google/gemini-3.1-flash-lite-preview $EMBED_FLAG
              }
              # Re-generate embeddings after evolve
              soop embed --graph .soop/graph.json --model $EMBED_MODEL
            fi
          fi

      - name: Save semantic cache
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        if: always()
        with:
          path: .soop/cache/semantic-cache.db*
          key: semantic-cache-${{ github.sha }}

      - name: Create PR with updated graph
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore(soop): update graph'
          title: 'chore(soop): update graph'
          body: Auto-generated by Repo Encode workflow.
          branch: chore/soop-update-graph
          add-paths: .soop/
